<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSuite - The Ultimate Control Matrix</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: rgba(21, 28, 48, 0.6);
            --bg-modal: #0f1626;
            --primary: #a78bfa;
            --primary-hover: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --accent-gold: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(139, 92, 246, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.03), transparent 35%);
            color: var(--text-main);
            margin: 0;
            padding: 25px;
        }

        .container { max-width: 1450px; margin: 0 auto; }

        /* Navbar Header */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(21, 28, 48, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 35px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .brand h1 { margin: 0; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand p { margin: 4px 0 0 0; font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.5px; }

        .nav-controls { display: flex; align-items: center; gap: 20px; }
        
        /* Language Buttons */
        .lang-selector { display: flex; gap: 6px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        .lang-btn { background: none; border: none; color: var(--text-muted); padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .lang-btn.active { background: var(--primary); color: #000; }

        /* Auth System */
        .auth-cluster { display: flex; gap: 10px; }
        .btn-auth { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.88rem; }
        .btn-auth.fill { background: var(--primary); color: #060913; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }

        /* Rows Layout Architecture */
        .row-section { margin-bottom: 40px; }
        .row-header { display: flex; align-items: center; gap: 12px; font-size: 1.35rem; font-weight: 800; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
        .row-header.row1 { color: var(--primary); }
        .row-header.row2 { color: var(--accent-gold); }
        .row-header.row3 { color: var(--success); }

        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        /* Luxury Cyber Cards */
        .matrix-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .matrix-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, var(--glass-glow), transparent); opacity: 0; transition: opacity 0.3s; }
        .matrix-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 12px 30px rgba(139, 92, 246, 0.1); }
        .matrix-card:hover::before { opacity: 1; }

        .card-badge { align-self: flex-start; font-size: 0.72rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; margin-bottom: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
        .badge-ai { background: rgba(167, 139, 250, 0.12); color: var(--primary); }
        .badge-finance { background: rgba(251, 191, 36, 0.12); color: var(--accent-gold); }
        .badge-skills { background: rgba(16, 185, 129, 0.12); color: var(--success); }

        .matrix-card h3 { margin: 0 0 10px 0; font-size: 1.25rem; color: #fff; font-weight: 700; }
        .matrix-card p { margin: 0 0 25px 0; font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }
        
        .btn-trigger {
            margin-top: auto; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: #fff;
            padding: 11px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; text-align: center; cursor: pointer;
        }
        .matrix-card:hover .btn-trigger { background: var(--primary); color: #060913; border-color: var(--primary); font-weight: 700; }

        /* Split Utilities Area */
        .utility-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 950px) { .utility-layout { grid-template-columns: 1fr; } }

        .panel-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 25px; }
        .panel-box h2 { margin-top: 0; margin-bottom: 20px; font-size: 1.35rem; color: var(--primary); }

        .input-ctrl { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px 16px; border-radius: 10px; color: #fff; outline: none; font-size: 0.95rem; margin-bottom: 15px; }
        .input-ctrl:focus { border-color: var(--primary); }
        
        .btn-action { width: 100%; background: var(--primary); color: #060913; border: none; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-action:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Advanced Modern Modals Architecture */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 11, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-frame { background: var(--bg-modal); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 750px; border-radius: 20px; padding: 30px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-frame { transform: scale(1); }
        
        .modal-close { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.05); border: none; color: #fff; font-size: 1.1rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--danger); }
        .modal-title { margin-top: 0; font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; font-weight: 800; }

        /* Embedded Live Graph Adjustments */
        .tradingview-embed-wrapper { width: 100%; height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    </style>
</head
