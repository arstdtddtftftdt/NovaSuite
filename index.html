<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSuite - Next-Gen AI & Tech Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            color: #9ca3af;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .status-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        p {
            color: #d1d5db;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">NovaSuite</div>
        <h1>Next-Gen AI & Financial Tools Hub</h1>
        
        <div class="card">
            <div class="status-badge">System Status: Deploying Hub</div>
            <p>We are currently configuring our automated AI insights and professional tech suite. Something massive is coming very soon.</p>
        </div>
        
        <div class="footer">
            &copy; 2026 NovaSuite. All rights reserved.
        </div>
    </div>

</body>
</html>
