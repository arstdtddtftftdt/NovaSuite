<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSuite Sovereign Core</title>
    <style>
        :root {
            --bg-deep: #05070f;
            --bg-surface: #0c0f1d;
            --bg-field: #060813;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-gold: #f59e0b;
            --text-heading: #ffffff;
            --text-body: #f3f4f6;
            --text-muted: #6b7280;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-body); padding: 25px; }
        .workspace { max-width: 1400px; margin: 0 auto; }

        /* Header Style */
        .premium-header {
            background: linear-gradient(135deg, var(--bg-surface) 0%, #12162b 100%);
            border: 1px solid var(--border-color);
            padding: 20px 30px;
            border-radius: 14px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-title h1 { font-size: 1.8rem; color: var(--text-heading); font-weight: 800; }
        .brand-title p { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; }
        .system-badge { background: rgba(139, 92, 246, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

        /* Grid Layout */
        .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .panel-full { grid-column: span 12; }
        .panel-7 { grid-column: span 7; }
        .panel-5 { grid-column: span 5; }
        @media (max-width: 1024px) { .panel-7, .panel-5 { grid-column: span 12; } }

        /* Panel UI */
        .matrix-panel { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; }
        .panel-header { font-size: 1.15rem; font-weight: 700; color: var(--text-heading); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }

        /* Controls */
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .field-group { display: flex; flex-direction: column; gap: 5px; }
        .field-group label { font-size: 0.8rem; color: var(--text-muted); }
